<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel VIP - Wanderlust</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #f4f7f6 0%, #e0eafc 100%); 
            padding: 40px 20px; 
            font-family: 'Poppins', sans-serif; 
            color: #333;
            min-height: 100vh;
        }
        
        .dashboard-container { 
            max-width: 1000px; 
            margin: 0 auto; 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header-dashboard {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #f0f0f0; padding-bottom: 20px; margin-bottom: 30px;
        }

        .header-dashboard h2 { color: #2c3e50; font-weight: 700; display: flex; align-items: center; gap: 10px; }

        .btn-logout { 
            background: #ff6b6b; color: white; border: none; padding: 10px 25px; 
            border-radius: 50px; cursor: pointer; font-weight: 600; transition: 0.3s; 
            display: flex; align-items: center; gap: 8px; font-family: 'Poppins', sans-serif;
        }
        .btn-logout:hover { background: #ff4757; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,107,107,0.3); }

        .widget-api { 
            background: linear-gradient(45deg, #00cba9, #009e83); color: white;
            padding: 20px 25px; border-radius: 15px; margin-bottom: 30px;
            font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 10px 20px rgba(0, 203, 169, 0.2);
        }

        .widget-api i { font-size: 1.5rem; color: #fffbd5; }

        h3 { color: #2c3e50; margin-bottom: 15px; font-weight: 700; }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px 20px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background-color: #f8f9fa; color: #7f8c8d; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
        tr:hover { background-color: #fcfcfc; transition: 0.3s; }
        
        .badge-destino { background: #e0f7fa; color: #00796b; padding: 5px 12px; border-radius: 20px; font-weight: 600; font-size: 0.85rem; }
        .price-text { font-weight: 700; color: #2c3e50; }

        .paginacion { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 30px; }
        .btn-page { 
            padding: 8px 20px; background: white; color: #00cba9; border: 2px solid #00cba9; 
            border-radius: 50px; cursor: pointer; font-weight: 600; transition: 0.3s; font-family: 'Poppins', sans-serif;
        }
        .btn-page:hover { background: #00cba9; color: white; box-shadow: 0 5px 15px rgba(0,203,169,0.2); }
        #info-pagina { font-weight: 700; color: #7f8c8d; background: #f8f9fa; padding: 8px 15px; border-radius: 50px; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header-dashboard">
            <h2><i class="fas fa-shield-alt" style="color:#00cba9;"></i> Panel de Control VIP</h2>
            <button onclick="cerrarSesion()" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button>
        </div>
        <div class="widget-api" id="api-divisas">
            <i class="fas fa-sync-alt fa-spin"></i> Conectando con API de Divisas...
        </div>
        <h3><i class="fas fa-ticket-alt" style="color:#7f8c8d; margin-right:8px;"></i> Reservas Globales</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Destino</th>
                        <th>Fecha de Viaje</th>
                        <th>Precio (USD)</th>
                    </tr>
                </thead>
                <tbody id="tabla-reservas"></tbody>
            </table>
        </div>
        <div class="paginacion">
            <button class="btn-page" onclick="cambiarPagina(-1)"><i class="fas fa-chevron-left"></i> Anterior</button>
            <span id="info-pagina">Página 1</span>
            <button class="btn-page" onclick="cambiarPagina(1)">Siguiente <i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <script>
        const API_URL = '';
        let paginaActual = 1;
        const token = localStorage.getItem('token');

        window.onload = () => {
            if (!token) {
                alert("Debes iniciar sesión primero.");
                window.location.href = "perfil.html";
                return;
            }
            cargarDivisas();
            cargarReservasAdmin();
        };

        async function cargarDivisas() {
            try {
                const res = await fetch(`${API_URL}/api/divisas`);
                const data = await res.json();
                document.getElementById('api-divisas').innerHTML = 
                    `<i class="fas fa-globe-americas"></i> Tipo de Cambio Actual (API Externa): 1 USD = $${data.MXN.toFixed(2)} MXN`;
            } catch (error) {
                document.getElementById('api-divisas').innerHTML = "<i class='fas fa-exclamation-triangle'></i> Servicio de divisas no disponible";
            }
        }

        async function cargarReservasAdmin() {
            try {
                const res = await fetch(`${API_URL}/api/admin/reservas?page=${paginaActual}&limit=5`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.status === 403) {
                    alert("Acceso denegado. No eres administrador.");
                    window.location.href = "perfil.html";
                    return;
                }

                const json = await res.json();
                const tbody = document.getElementById('tabla-reservas');
                tbody.innerHTML = '';

                json.data.forEach(r => {
                    let fechaBonita = 'Pendiente';
                    if(r.fecha_viaje) {
                        const fechaObj = new Date(r.fecha_viaje);
                        fechaObj.setMinutes(fechaObj.getMinutes() + fechaObj.getTimezoneOffset());
                        fechaBonita = fechaObj.toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric' });
                    }

                    tbody.innerHTML += `
                        <tr>
                            <td style="color:#7f8c8d; font-weight:bold;">#${r.id}</td>
                            <td style="font-weight:600; color:#34495e;">${r.username}</td>
                            <td><span class="badge-destino">${r.destino}</span></td>
                            <td style="color:#555;"><i class="far fa-calendar-alt"></i> ${fechaBonita}</td>
                            <td class="price-text">${r.precio}</td>
                        </tr>
                    `;
                });

                document.getElementById('info-pagina').innerText = `Página ${json.paginaActual} de ${json.totalPaginas}`;
            } catch (error) {}
        }

        function cambiarPagina(direccion) {
            if (paginaActual + direccion > 0) {
                paginaActual += direccion;
                cargarReservasAdmin();
            }
        }

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
</body>
</html>
